# .github/workflows/deploy.yml

name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  pages: write # 👈 needed for the deploy-pages action
  id-token: write # 👈 required for authentication with GitHub Pages

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Build Vite site
        run: npm run build

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Resolve Chromium path
        run: |
          if command -v chromium-browser >/dev/null 2>&1; then
            echo "CHROME_PATH=$(command -v chromium-browser)" >> "$GITHUB_ENV"
          elif command -v chromium >/dev/null 2>&1; then
            echo "CHROME_PATH=$(command -v chromium)" >> "$GITHUB_ENV"
          else
            echo "Chromium binary not found"
            exit 1
          fi

      - name: Run all tests
        run: npm test

      - name: Run Lighthouse CI
        run: npm run lhci:autorun

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
