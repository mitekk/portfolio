<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" sizes="48x48" type="image/png" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta
      name="theme-color"
      content="#f3f1e9"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#27272a"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      SEO meta (title, description, robots, canonical, Open Graph, Twitter) is owned
      solely by SeoHead (react-helmet-async) and baked into each prerendered route.
      Do NOT duplicate it here — static copies collide with the per-route tags and
      produce conflicting og:image, og:title and title tags in the prerendered HTML.
    -->
    <script>
      (function () {
        var t;
        try {
          t = localStorage.getItem("theme");
        } catch (_) {}
        if (!t)
          t = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        document.documentElement.dataset.theme = t;
        document.documentElement.dataset.loading = "1";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
