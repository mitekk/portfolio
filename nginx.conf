server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Serve the CV inline (open in browser) rather than forcing a download.
  location = /Mitya_Kurs.pdf {
    default_type application/pdf;
    add_header Content-Disposition "inline; filename=\"Mitya_Kurs.pdf\"";
    expires 1d;
    add_header Cache-Control "public, must-revalidate";
  }

  # Social share cards + icons: long-lived but revalidated so refreshed art propagates.
  location ~* ^/(og-image|cv-og|cv-thumb|profile|apple-touch-icon|icon-192|icon-512|favicon-32|favicon)\.png$ {
    expires 7d;
    add_header Cache-Control "public, must-revalidate";
  }

  location = /site.webmanifest {
    default_type application/manifest+json;
    expires 7d;
    add_header Cache-Control "public, must-revalidate";
  }

  location = /index.html {
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
  }

  location / {
    try_files $uri $uri/index.html /index.html;
  }
}
